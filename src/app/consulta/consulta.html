<div fxLayout="row" fxLayoutAlign="center">
  <div fxLayout="column" fxFlex="1100px">
    <form action="" class="mt-60" #buscaFrm="ngForm" (ngSubmit)="pesquisar()">
      <mat-card apearance="outlined">
        <mat-card-header>
          <mat-card-title>Consulta</mat-card-title>
        </mat-card-header>
        <mat-card-content class="mb-20">
          <div fxLayout="row" fxLayoutGap="20px">
            <mat-form-field fxFlex>
              <mat-label>Nome</mat-label>
              <input matInput name="nomeBusca" [(ngModel)]="nomeBusca" placeholder="Digite o nome para busca">
            </mat-form-field>
            <!--<mat-form-field fxFlex>
              <mat-label>CPF</mat-label>
              <input matInput name="cpf"  placeholder="Digite o CPF para busca" mask="000.000.000-00">
            </mat-form-field>-->
          </div>
        </mat-card-content>
        <mat-card-actions align="start">
          <button mat-flat-button color="primary" type="submit" (click)="pesquisar()">
            <mat-icon fontIcon="search"></mat-icon>
            Buscar
          </button>
        </mat-card-actions>
      </mat-card>


    </form>
  </div>
</div>

<div fxLayout="row" fxLayoutAlign="center">
  <div fxlayout="column" fxFlex="1100px">
    <mat-card appearance="outlined">
      <mat-card-header>
        <mat-card-title>Resultado da Consulta</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <table mat-table [dataSource]="listaClientes" class="mat-elevation-z8">

          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> ID </th>
            <td mat-cell *matCellDef="let cliente"> {{cliente.id}} </td>
          </ng-container>

          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let cliente"> {{cliente.nome}} </td>
          </ng-container>

          <ng-container matColumnDef="cpf">
            <th mat-header-cell *matHeaderCellDef> CPF </th>
            <td mat-cell *matCellDef="let cliente"> {{cliente.cpf}} </td>
          </ng-container>

          <ng-container matColumnDef="dataNascimento">
            <th mat-header-cell *matHeaderCellDef> Data de Nascimento </th>
            <td mat-cell *matCellDef="let cliente"> {{cliente.dataNascimento}} </td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef> Email </th>
            <td mat-cell *matCellDef="let cliente"> {{cliente.email}} </td>
          </ng-container>

          <ng-container matColumnDef="acoes">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let cliente">
              <button type="button" mat-button color="primary" (click)="preparaEditar(cliente.id)">
                <mat-icon fontIcon="edit"></mat-icon>
                Editar
              </button>

              @if(!cliente.deletando){
              <button type="button" mat-button color="warn" (click)="preparaDeletar(cliente)">
                <mat-icon fontIcon="delete"></mat-icon>
                Excluir
              </button>
              } @else {
              <button type="button" mat-button color="warn" (click)="excluir(cliente)">
                <mat-icon fontIcon="question_mark"></mat-icon>
                confirma
              </button>
              }
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="colunasTable"></tr>
          <tr mat-row *matRowDef="let row; columns: colunasTable;"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </div>
</div>
